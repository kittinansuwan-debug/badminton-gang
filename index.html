<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดก๊วนแบดมินตัน</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19; /* พื้นหลังสีดำเข้มสปอร์ต */
            margin: 0;
            padding: 20px;
            color: #f1f5f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #111827; /* กล่องสีเทาเข้มดุดัน */
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #1f2937;
        }
        h1, h2 {
            text-align: center;
            color: #38bdf8; /* สีฟ้าไฟนีออน */
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #1f2937;
            border-radius: 12px;
            background: #1f2937; /* สีพื้นหลังการ์ด */
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #94a3b8;
            font-size: 14px;
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #111827;
            border: 2px solid #334155;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            color: #fff;
            transition: all 0.2s ease;
        }
        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
        }
        .score-input {
            width: 60px !important;
            text-align: center;
            padding: 8px !important;
            margin: 0 5px;
            display: inline-block;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }
        button:hover {
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(56, 189, 248, 0.4);
        }
        button:active {
            transform: translateY(1px);
        }
        .player-input-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .result-box {
            background: #0f172a;
            padding: 18px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            color: #4ade80; /* สีเขียวสะท้อนแสงดุดัน */
            border: 1px dashed #22c55e;
            text-shadow: 0 0 8px rgba(74, 222, 128, 0.2);
        }
        .match-card {
            background: #111827;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 5px solid #38bdf8;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #1f2937;
        }
        .match-header {
            font-weight: bold;
            color: #38bdf8;
            font-size: 14px;
        }
        .match-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .team {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 15px;
        }
        .vs-zone {
            display: flex;
            align-items: center;
        }
        .vs {
            color: #f43f5e; /* สีแดงสปอร์ต */
            font-weight: 900;
            margin: 0 10px;
            font-style: italic;
        }
        /* ตารางอันดับ */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background-color: #111827;
            border-radius: 8px;
            overflow: hidden;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 12px 15px;
            text-align: center;
        }
        .leaderboard-table th {
            background-color: #1f2937;
            color: #38bdf8;
            font-weight: bold;
            border-bottom: 2px solid #334155;
        }
        .leaderboard-table tr {
            border-bottom: 1px solid #1f2937;
        }
        .leaderboard-table tr:last-child {
            border-bottom: none;
        }
        .top-player {
            color: #4ade80 !important;
            font-weight: bold;
        }
        .badge-winner {
            background-color: #22c55e;
            color: #0f172a;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 5px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏸 BADMINTON SQUAD</h1>

    <!-- ส่วนที่ 1: คำนวณค่าใช้จ่าย -->
    <div class="section">
        <h2>💰 COURT & SHUTTLE FEE</h2>
        <div class="grid-2">
            <div>
                <label for="courtFee">ค่าสนามทั้งหมด (บาท):</label>
                <input type="number" id="courtFee" value="0" min="0" oninput="calculateExpenses()">
            </div>
            <div>
                <label for="shuttleFee">ค่าลูกแบดทั้งหมด (บาท):</label>
                <input type="number" id="shuttleFee" value="0" min="0" oninput="calculateExpenses()">
            </div>
        </div>
        <div class="result-box" id="expenseResult">
            ค่าใช้จ่ายต่อคน: 0 บาท
        </div>
    </div>

    <!-- ส่วนที่ 2: จัดการรายชื่อผู้เล่น -->
    <div class="section">
        <h2>👥 PLAYERS LIST</h2>
        <div style="margin-bottom: 15px;">
            <label for="playerCount">จำนวนคนทั้งหมดที่มาเล่น:</label>
            <input type="number" id="playerCount" value="4" min="4" onchange="generatePlayerInputs()">
        </div>
        <div class="player-input-list" id="playerInputs">
            <!-- ช่องใส่ชื่อจะถูกสร้างอัตโนมัติจาก JavaScript -->
        </div>
    </div>

    <!-- ปุ่มสุ่มทีม -->
    <button onclick="generateRoundRobinTeams()">🔀 RANDOM MATCHES</button>

    <!-- ส่วนที่ 3: แสดงผลตารางแข่งขัน -->
    <div class="section" style="margin-top: 25px;">
        <h2>🏸 MATCH SCHEDULE & SCORES</h2>
        <p style="color: #94a3b8; font-size: 13px; margin-top: -10px; margin-bottom: 15px; text-align: center;">กรอกคะแนนดิบลงในช่อง ระบบจะคำนวณผู้ชนะและแต้มได้เสียให้ด้านล่างอัตโนมัติ</p>
        <div id="matchSchedule">
            <p style="text-align: center; color: #64748b;">กดปุ่มด้านบนเพื่อเริ่มจัดทีม</p>
        </div>
    </div>

    <!-- ส่วนที่ 4: ตารางสรุปคะแนนรวม -->
    <div class="section">
        <h2>🏆 LEADERBOARD</h2>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>อันดับ</th>
                    <th>ชื่อผู้เล่น</th>
                    <th>ชนะ (แมตช์)</th>
                    <th>คะแนนดิบสะสม</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                <tr>
                    <td colspan="4" style="color: #64748b;">ยังไม่มีข้อมูลการแข่งขัน</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // เก็บโครงสร้างแมตช์ปัจจุบันทั่วโลกของหน้าเว็บเพื่อใช้คำนวณคะแนน
    let currentMatches = [];

    // สร้างช่องใส่ชื่อผู้เล่นตามจำนวนที่ระบุ
    function generatePlayerInputs() {
        const count = parseInt(document.getElementById('playerCount').value) || 4;
        const container = document.getElementById('playerInputs');
        container.innerHTML = '';

        for (let i = 1; i <= count; i++) {
            const div = document.createElement('div');
            div.innerHTML = `
                <input type="text" id="player_${i}" value="ผู้เล่น ${i}" placeholder="ชื่อคนที่ ${i}" oninput="updateLeaderboard()">
            `;
            container.appendChild(div);
        }
        calculateExpenses();
        updateLeaderboard();
    }

    // คำนวณค่าใช้จ่ายหารเท่ากันทุกคน
    function calculateExpenses() {
        const courtFee = parseFloat(document.getElementById('courtFee').value) || 0;
        const shuttleFee = parseFloat(document.getElementById('shuttleFee').value) || 0;
        const playerCount = parseInt(document.getElementById('playerCount').value) || 4;

        const total = courtFee + shuttleFee;
        const perPerson = total / playerCount;

        document.getElementById('expenseResult').innerText = `ค่าใช้จ่ายต่อคน: ${perPerson.toFixed(2)} บาท`;
    }

    // อัลกอริทึมสร้างแมตช์แบบพบกันหมด (Round Robin สำหรับประเภทคู่)
    function generateRoundRobinTeams() {
        const playerCount = parseInt(document.getElementById('playerCount').value) || 4;
        let players = [];

        for (let i = 1; i <= playerCount; i++) {
            const name = document.getElementById(`player_${i}`).value.trim();
            players.push(name ? name : `ผู้เล่น ${i}`);
        }
