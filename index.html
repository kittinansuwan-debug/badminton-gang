<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดก๊วนแบดมินตัน</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            margin: 0;
            padding: 20px;
            color: #f1f5f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #111827;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #1f2937;
        }
        h1, h2 {
            text-align: center;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #1f2937;
            border-radius: 12px;
            background: #1f2937;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #94a3b8;
            font-size: 14px;
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #111827;
            border: 2px solid #334155;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            color: #fff;
            transition: all 0.2s ease;
        }
        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
        }
        input.score-input {
            width: 60px;
            text-align: center;
            padding: 8px;
            margin: 0 5px;
            display: inline-block;
        }
        button {
            width: 100%;
            padding: 15px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            margin-bottom: 10px;
        }
        .btn-blue {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }
        .btn-blue:hover {
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            box-shadow: 0 6px 15px rgba(56, 189, 248, 0.4);
        }
        .btn-green {
            background: linear-gradient(135deg, #16a34a, #15803d);
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
        }
        .btn-green:hover {
            background: linear-gradient(135deg, #4ade80, #16a34a);
            box-shadow: 0 6px 15px rgba(74, 222, 128, 0.4);
        }
        button:hover {
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(1px);
        }
        .player-input-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .result-box {
            background: #0f172a;
            padding: 18px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            color: #4ade80;
            border: 1px dashed #22c55e;
            text-shadow: 0 0 8px rgba(74, 222, 128, 0.2);
        }
        .match-card {
            background: #111827;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 5px solid #38bdf8;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 1px solid #1f2937;
            border-right: 1px solid #1f2937;
            border-bottom: 1px solid #1f2937;
        }
        .match-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .team {
            font-weight: 600;
            color: #e2e8f0;
        }
        .vs {
            color: #f43f5e;
            font-weight: 900;
            margin: 0 12px;
            font-style: italic;
        }
        .score-zone {
            display: flex;
            align-items: center;
            background: #0f172a;
            padding: 5px 10px;
            border-radius: 6px;
        }
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            text-align: left;
        }
        .rank-table th, .rank-table td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }
        .rank-table th {
            color: #38bdf8;
            background-color: #0f172a;
        }
        .rank-table tr:hover {
            background-color: #111827;
        }
        .podium-1 { color: #f59e0b; font-weight: bold; }
        .podium-2 { color: #cbd5e1; font-weight: bold; }
        .podium-3 { color: #b45309; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏸 BADMINTON SQUAD</h1>

    <!-- ส่วนที่ 1: คำนวณค่าใช้จ่าย -->
    <div class="section">
        <h2>💰 COURT & SHUTTLE FEE</h2>
        <div class="grid-2">
            <div>
                <label for="courtFee">ค่าสนามทั้งหมด (บาท):</label>
                <input type="number" id="courtFee" value="0" min="0" oninput="calculateExpenses()">
            </div>
            <div>
                <label for="shuttleFee">ค่าลูกแบดทั้งหมด (บาท):</label>
                <input type="number" id="shuttleFee" value="0" min="0" oninput="calculateExpenses()">
            </div>
        </div>
        <div class="result-box" id="expenseResult">
            ค่าใช้จ่ายต่อคน: 0.00 บาท
        </div>
    </div>

    <!-- ส่วนที่ 2: จัดการรายชื่อผู้เล่น -->
    <div class="section">
        <h2>👥 PLAYERS LIST</h2>
        <div style="margin-bottom: 15px;">
            <label for="playerCount">จำนวนคนทั้งหมดที่มาเล่น:</label>
            <input type="number" id="playerCount" value="4" min="4" oninput="generatePlayerInputs()">
        </div>
        <div class="player-input-list" id="playerInputs">
            <!-- ช่องใส่ชื่อจะถูกสร้างอัตโนมัติจาก JavaScript -->
        </div>
    </div>

    <!-- ปุ่มสุ่มทีม -->
    <button class="btn-blue" onclick="generateRoundRobinTeams()">🔀 RANDOM MATCHES (สุ่มคู่แข่ง)</button>

    <!-- ส่วนที่ 3: แสดงผลตารางแข่งขัน -->
    <div class="section" style="margin-top: 25px;">
        <h2>🏸 MATCH SCHEDULE & SCORES</h2>
        <div id="matchSchedule">
            <p style="text-align: center; color: #64748b;">กรอกรายชื่อแล้วกดปุ่ม "สุ่มคู่แข่ง" ด้านบนได้เลย!</p>
        </div>
    </div>

    <!-- ปุ่มคำนวณและจัดอันดับ -->
    <button class="btn-green" id="calcRankBtn" style="display:none;" onclick="calculateRankings()">📊 CALCULATE RANKINGS (สรุปและจัดอันดับ)</button>

    <!-- ส่วนที่ 4: ตารางอันดับผู้ชนะ -->
    <div class="section" id="rankSection" style="display:none; margin-top: 25px;">
        <h2>🏆 LEADERBOARD (อันดับก๊วนวันนี้)</h2>
        <div id="rankResult"></div>
    </div>
</div>

<script>
    // ตัวแปรเก็บข้อมูลแมตช์ปัจจุบันทั่วทั้งระบบ
    let globalMatches = [];

    // ฟังก์ชันสร้างช่องกรอกชื่อผู้เล่นแบบเสถียร
    function generatePlayerInputs() {
        const countInput = document.getElementById('playerCount');
        let count = parseInt(countInput.value) || 4;
        
        if (count < 4) count = 4;
        
        const container = document.getElementById('playerInputs');
        container.innerHTML = '';

        for (let i = 1; i <= count; i++) {
            const div = document.createElement('div');
            div.innerHTML = `
                <input type="text" id="player_${i}" value="มือ ${i}" placeholder="ชื่อคนที่ ${i}">
            `;
            container.appendChild(div);
        }
        calculateExpenses();
        // ซ่อนตารางคะแนนเมื่อเปลี่ยนจำนวนคน
        document.getElementById('calcRankBtn').style.display = 'none';
        document.getElementById('rankSection').style.display = 'none';
    }

    // ฟังก์ชันคำนวณเงินค่าใช้จ่ายแบบเรียลไทม์
    function calculateExpenses() {
        const courtFee = parseFloat(document.getElementById('courtFee').value) || 0;
        const shuttleFee = parseFloat(document.getElementById('shuttleFee').value) || 0;
        const playerCount = parseInt(document.getElementById('playerCount').value) || 4;

        const total = courtFee + shuttleFee;
        const perPerson = total / playerCount;

        document.getElementById('expenseResult').innerText = `ค่าใช้จ่ายต่อคน: ${perPerson.toFixed(2)} บาท`;
    }

    // อัลกอริทึมจับคู่แข่งขันคู่อิงตาม Round Robin ที่แก้ไขแล้วให้ทำงาน 100%
    function generateRoundRobinTeams() {
        const playerCount = parseInt(document.getElementById('playerCount').value) || 4;
        let players = [];

        for (let i = 1; i <= playerCount; i++) {
            const nameEl = document.getElementById(`player_${i}`);
            const name = nameEl ? nameEl.value.trim() : `มือ ${i}`;
            players.push(name ? name : `มือ ${i}`);
        }

        const matchScheduleDiv = document.getElementById('matchSchedule');
        matchScheduleDiv.innerHTML = '';
        globalMatches = []; 

        if (players.length < 4) {
            matchScheduleDiv.innerHTML = '<p style="text-align:center; color:#ef4444; font-weight:bold;">จำเป็นต้องมีผู้เล่นอย่างน้อย 4 คนจึงจะจัดทีมคู่ได้</p>';
            return;
        }
