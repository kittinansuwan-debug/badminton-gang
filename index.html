<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏸 Pattaya Badminton Club</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #0284c7;
            --accent: #38bdf8;
            --neon-green: #4ade80;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            color: var(--text-main);
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 20px 0;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }
        .header p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .card h2 {
            margin-top: 0;
            font-size: 18px;
            color: var(--accent);
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text-muted);
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            color: white;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
        .total-box {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            color: white;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }
        .player-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }
        button.btn-action {
            width: 100%;
            padding: 14px;
            background-color: var(--neon-green);
            color: #0f172a;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
        }
        button.btn-action:active {
            transform: scale(0.98);
        }
        button.btn-action:hover {
            background-color: #22c55e;
        }
        .match-item {
            background: #0f172a;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .match-number {
            font-size: 12px;
            background: #334155;
            padding: 3px 8px;
            border-radius: 20px;
            color: var(--text-muted);
        }
        .versus-box {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
        }
        .team-name {
            font-weight: 600;
            color: var(--text-main);
        }
        .vs-label {
            color: #ef4444;
            font-style: italic;
            font-weight: bold;
            font-size: 13px;
        }
        .empty-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            padding: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏸 PARTY BADMINTON</h1>
        <p>ระบบคำนวณค่าคอร์ทและจัดทีมพบกันหมด</p>
    </div>

    <!-- ส่วนที่ 1: การเงิน -->
    <div class="card">
        <h2>💰 รายละเอียดค่าใช้จ่าย</h2>
        <div class="grid-2">
            <div>
                <label>ค่าสนามทั้งหมด (บาท)</label>
                <input type="number" id="courtFee" value="0" min="0" oninput="calculateExpenses()">
            </div>
            <div>
                <label>ค่าลูกแบดทั้งหมด (บาท)</label>
                <input type="number" id="shuttleFee" value="0" min="0" oninput="calculateExpenses()">
            </div>
        </div>
        <div class="total-box" id="expenseResult">
            หารเฉลี่ย: 0.00 บาท / คน
        </div>
    </div>

    <!-- ส่วนที่ 2: สมาชิก -->
    <div class="card">
        <h2>👥 รายชื่อก๊วนตีแบด</h2>
        <div style="margin-bottom: 15px;">
            <label>จำนวนคนที่มาวันนี้ (คน)</label>
            <input type="number" id="playerCount" value="4" min="4" onchange="generatePlayerInputs()">
        </div>
        <div class="player-list" id="playerInputs"></div>
    </div>

    <!-- ปุ่มกด -->
    <div style="margin-bottom: 20px;">
        <button class="btn-action" onclick="generateRoundRobinTeams()">🔀 สุ่มทีมพบกันหมด</button>
    </div>

    <!-- ส่วนที่ 3: ตารางแข่ง -->
    <div class="card">
        <h2>📅 ตารางประกบคู่แข่งขัน</h2>
        <div id="matchSchedule">
            <div class="empty-text">กรอกรายชื่อแล้วกดปุ่ม "สุ่มทีม" ด้านบนได้เลย!</div>
        </div>
    </div>
</div>

<script>
    function generatePlayerInputs() {
        const count = parseInt(document.getElementById('playerCount').value) || 4;
        const container = document.getElementById('playerInputs');
        container.innerHTML = '';

        for (let i = 1; i <= count; i++) {
            const div = document.createElement('div');
            div.innerHTML = `
                <input type="text" id="player_${i}" value="มือ ${i}" placeholder="ชื่อคนที่ ${i}">
            `;
            container.appendChild(div);
        }
        calculateExpenses();
    }

    function calculateExpenses() {
        const courtFee = parseFloat(document.getElementById('courtFee').value) || 0;
        const shuttleFee = parseFloat(document.getElementById('shuttleFee').value) || 0;
        const playerCount = parseInt(document.getElementById('playerCount').value) || 4;

        const total = courtFee + shuttleFee;
        const perPerson = total / playerCount;

        document.getElementById('expenseResult').innerText = `หารเฉลี่ย: ${perPerson.toFixed(2)} บาท / คน`;
    }

    function generateRoundRobinTeams() {
        const playerCount = parseInt(document.getElementById('playerCount').value) || 4;
        let players = [];

        for (let i = 1; i <= playerCount; i++) {
            const name = document.getElementById(`player_${i}`).value.trim();
            players.push(name ? name : `มือ ${i}`);
        }

        for (let i = players.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [players[i], players[j]] = [players[j], players[i]];
        }

        const matchScheduleDiv = document.getElementById('matchSchedule');
        matchScheduleDiv.innerHTML = '';

        if (players.length < 4) {
            matchScheduleDiv.innerHTML = '<div class="empty-text" style="color:#f87171;">ต้องมีผู้เล่นอย่างน้อย 4 คนขึ้นไปครับ</div>';
            return;
        }

        let pairs = [];
        for (let i = 0; i < players.length; i++) {
            for (let j = i + 1; j < players.length; j++) {
                pairs.push([players[i], players[j]]);
            }
        }

        for (let i = pairs.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
        }

        let matchCount = 1;
        let usedPairs = new Set();

        for (let i = 0; i < pairs.length; i++) {
            if (usedPairs.has(i)) continue;

            for (let j = i + 1; j < pairs.length; j++) {
                if (usedPairs.has(j)) continue;

                const pairA = pairs[i];
                const pairB = pairs[j];

                if (!pairA.includes(pairB[0]) && !pairA.includes(pairB[1])) {
                    const item = document.createElement('div');
                    item.className = 'match-item';
                    item.innerHTML = `
                        <span class="match-number">คู่ที่ ${matchCount}</span>
                        <div class="versus-box">
                            <span class="team-name">${pairA[0]}+${pairA[1]}</span>
                            <span class="vs-label">VS</span>
                            <span class="team-name">${pairB[0]}+${pairB[1]}</span>
                        </div>
                    `;
                    matchScheduleDiv.appendChild(item);

                    usedPairs.add(i);
                    usedPairs.add(j);
                    matchCount++;
                    break; 
                }
            }
        }

        if(matchCount === 1) {
